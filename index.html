<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabPop - L4 Malala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pop-pink: #E96D9E;
            --pop-purple: #706CF5;
            --pop-blue-btn: #6670ED;
            --pop-yellow: #FBE269;
            --pop-bg: #FFEBEB;
            --pop-black: #1A1A1A;
            --pop-blue-card: #3B66F5;
        }

        body {
            font-family: 'Lexend', 'Noto Sans TC', sans-serif;
            background-color: var(--pop-bg);
            color: var(--pop-black);
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .neo-brutal {
            border: 3px solid var(--pop-black);
            box-shadow: 6px 6px 0px var(--pop-black);
            border-radius: 35px;
        }

        .login-card { background: white; position: relative; overflow: hidden; }
        .login-top-bar { height: 18px; background-color: var(--pop-pink); width: 100%; border-bottom: 3px solid var(--pop-black); }

        .btn-start {
            background-color: var(--pop-blue-btn);
            color: white;
            border: 3px solid var(--pop-black);
            box-shadow: 4px 4px 0px var(--pop-black);
            border-radius: 20px;
            transition: all 0.1s;
        }

        .input-brutal {
            border: 3px solid var(--pop-black);
            border-radius: 18px;
            padding: 12px 16px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #1a1a1a;
        }

        .hidden-screen { display: none !important; }

        /* --- Learn Card Styles --- */
        .card-main { 
            background: white; 
            padding: 24px; 
            width: 100%; 
            border: 4px solid var(--pop-black); 
            box-shadow: 10px 10px 0px var(--pop-black); 
            border-radius: 40px; 
            position: relative;
        }
        
        .learn-header {
            background-color: var(--pop-blue-card);
            height: 150px;
            margin: -24px -24px 20px -24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            border-radius: 35px 35px 0 0;
            border-bottom: 4px solid var(--pop-black);
        }

        .pos-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: black;
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 0.85rem;
        }

        .syllable-pill {
            background: var(--pop-yellow);
            padding: 4px 14px;
            border-radius: 12px;
            border: 2px solid var(--pop-black);
            font-weight: 900;
            font-size: 0.9rem;
            margin-right: 6px;
        }

        .ipa-pill {
            background: #F3F4F6;
            padding: 4px 14px;
            border-radius: 12px;
            color: #6B7280;
            font-weight: 700;
            font-size: 0.9rem;
            font-style: italic;
        }

        .section-label { font-weight: 900; color: #9CA3AF; font-size: 0.85rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .meaning-text { font-weight: 800; font-size: 1.25rem; line-height: 1.4; color: #111827; }
        .example-text { font-style: italic; color: #374151; line-height: 1.5; font-weight: 600; font-size: 1.1rem; }

        .mini-match-box {
            background-color: #FFF1F7;
            border-radius: 25px;
            padding: 20px;
            margin-top: 24px;
            border: 2px solid #FFE4F0;
        }

        .mini-match-btn {
            background: white;
            border: 2px solid #F3F4F6;
            padding: 12px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 800;
            box-shadow: 0px 3px 0px rgba(0,0,0,0.05);
            transition: all 0.1s;
        }
        .mini-match-btn.selected { border-color: var(--pop-purple); background: #F3F0FF; transform: translateY(1px); }
        .mini-match-btn.correct { border-color: #22C55E; background: #F0FDF4; opacity: 0.5; cursor: default; box-shadow: none; }

        .bottom-action-btn {
            background-color: var(--pop-black);
            color: white;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pulse-mic { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(233, 109, 158, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(233, 109, 158, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(233, 109, 158, 0); }
        }

        .cloze-blank {
            color: var(--pop-purple);
            text-decoration: underline;
            text-underline-offset: 8px;
            font-weight: 900;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm neo-brutal login-card">
            <div class="login-top-bar"></div>
            <div class="p-8 pt-10">
                <div class="mx-auto w-28 h-28 bg-[#FBE269] border-[3px] border-black rounded-full flex items-center justify-center relative mb-4" style="box-shadow: 4px 4px 0px rgba(0,0,0,1);">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2-2 10h8L7 22l2-10H1L13 2Z" fill="white"/></svg>
                </div>
                <div class="text-center mb-8">
                    <h1 class="text-[2.6rem] font-[900] italic tracking-tight leading-none">
                        <span style="color: #645EEB;">VOCAB</span><span style="color: #E96D9E;">POP</span>
                    </h1>
                    <p class="text-[#8492A6] font-[800] text-sm mt-2 tracking-widest uppercase">Student Login</p>
                </div>
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="w-1/2">
                            <label class="block text-[#3C4858] font-black text-xs mb-1 uppercase tracking-wider">Class</label>
                            <input id="login-class" type="text" class="w-full input-brutal" placeholder="104">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-[#3C4858] font-black text-xs mb-1 uppercase tracking-wider">No.</label>
                            <input id="login-no" type="text" class="w-full input-brutal" placeholder="15">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[#3C4858] font-black text-xs mb-1 uppercase tracking-wider">Name</label>
                        <input id="login-name" type="text" class="w-full input-brutal" placeholder="姓名">
                    </div>
                    <button onclick="handleLogin()" class="w-full btn-start py-5 text-xl font-black mt-4 flex items-center justify-center gap-3 uppercase">
                        Start Journey <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="screen-dashboard" class="hidden-screen min-h-screen flex flex-col">
        <header class="p-4 bg-white border-b-4 border-black z-50">
            <div class="flex justify-between items-center max-w-lg mx-auto">
                <div class="flex flex-col">
                    <h2 class="text-xl font-black tracking-tight"><span style="color: var(--pop-purple);">VOCAB</span><span style="color: var(--pop-pink);">POP</span></h2>
                    <p id="user-info" class="text-xs text-gray-500 font-bold"></p>
                </div>
                <div class="bg-black text-white px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2">
                    <span class="text-pop-yellow">★ LV.1</span> | <span id="user-xp">0 XP</span>
                </div>
            </div>
            <div class="flex mt-4 gap-2 max-w-lg mx-auto">
                <button id="tab-learn" onclick="switchMode('learn')" class="flex-1 py-3 neo-brutal font-bold flex items-center justify-center gap-2 bg-white" style="border-radius:15px; box-shadow: 3px 3px 0px black;">LEARN</button>
                <button id="tab-coach" onclick="switchMode('coach')" class="flex-1 py-3 neo-brutal font-bold flex items-center justify-center gap-2 bg-gray-100" style="border-radius:15px; box-shadow: 3px 3px 0px black;">COACH</button>
            </div>
        </header>

        <main id="content-learn" class="flex-1 p-6 max-w-lg mx-auto w-full overflow-y-auto">
            <div id="learn-card-container"></div>
        </main>

        <main id="content-coach" class="hidden-screen flex-1 p-4 max-w-lg mx-auto w-full space-y-4">
            <button onclick="startCoach('PRO SPEAK')" class="w-full neo-brutal bg-[#A0E9A8] p-6 flex items-center gap-6 text-left">
                <div class="bg-white p-4 rounded-2xl border-3 border-black"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></div>
                <div><h3 class="text-2xl font-black uppercase">PRO SPEAK</h3><p class="text-sm font-bold opacity-70">發音挑戰 (隨機 15 題)</p></div>
            </button>
            <button onclick="startCoach('SPELL IT')" class="w-full neo-brutal bg-[#B6C2FF] p-6 flex items-center gap-6 text-left">
                <div class="bg-white p-4 rounded-2xl border-3 border-black"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg></div>
                <div><h3 class="text-2xl font-black uppercase">SPELL IT</h3><p class="text-sm font-bold opacity-70">聽音拼寫 (隨機 15 題)</p></div>
            </button>
            <button onclick="startCoach('FILL IN')" class="w-full neo-brutal bg-[#FFD5A1] p-6 flex items-center gap-6 text-left">
                <div class="bg-white p-4 rounded-2xl border-3 border-black"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></div>
                <div><h3 class="text-2xl font-black uppercase">FILL IN</h3><p class="text-sm font-bold opacity-70">搭配詞克漏字 (隨機 15 題)</p></div>
            </button>
        </main>

        <footer id="learn-footer" class="p-4 bg-white border-t-4 border-black">
            <button onclick="nextLearnWord()" class="bottom-action-btn uppercase">Next Word <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><path d="M5 12h14m-7-7 7 7-7 7"/></svg></button>
        </footer>
    </div>

    <!-- 3. ACTIVITY OVERLAY -->
    <div id="overlay-activity" class="hidden-screen fixed inset-0 z-[100] bg-[#FFF5EB] flex flex-col">
        <header class="p-4 flex justify-between items-center border-b-4 border-black bg-white">
            <button onclick="exitActivity()" class="neo-brutal px-3 py-1 bg-white font-bold text-sm uppercase">Exit</button>
            <div id="activity-progress" class="bg-gray-100 px-3 py-1 rounded-full font-bold text-sm border-2 border-black">1 / 15</div>
        </header>
        <div id="activity-body" class="flex-1 p-6 flex flex-col items-center justify-center overflow-y-auto"></div>
        <footer class="p-6 bg-white border-t-4 border-black">
            <button id="btn-action" class="bottom-action-btn uppercase">Check Answer</button>
        </footer>
    </div>

    <script>

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyFva945ZNpjqANvNmvfNbjYeUSZrPnf0b5NfkL93zKnlXrE2jSNqN-fpwkZfzQEue/exec"; 

        const VOCAB_DATA = [
            { word: "female", targetWord: "female", pos: "adj./n.", chinese: "女性的；女性", english: "being or referring to a woman", syllables: ["fe", "male"], ipa: "/'fimel/", example: "Amelia Earhart was the first female pilot to fly solo across the Atlantic Ocean.", translation: "艾蜜莉亞·艾爾哈特是第一位獨自飛越大西洋的女性飛行員。", collocations: [["female", "pilot", "女性飛行員"], ["female", "student", "女學生"], ["female", "lead", "女主角"]], etymology: "From Latin 'femella', diminutive of 'femina' (woman)." },
            { word: "region", targetWord: "regions", pos: "n.", chinese: "地區", english: "a large land area with similar features", syllables: ["re", "gion"], ipa: "/'ridʒən/", example: "The northern regions of the country are usually windy and snowy in winter.", translation: "這個國家的北部地區冬天通常多風且積雪。", collocations: [["coastal", "region", "沿海地區"], ["northern", "region", "北部地區"], ["regional", "development", "區域發展"]], etymology: "From Latin 'regere' (to rule), an area under rule." },
            { word: "regional", targetWord: "regional", pos: "adj.", chinese: "地區的", english: "relating to a particular region or area", syllables: ["re", "gion", "al"], ipa: "/'ridʒən!/", example: "Winners of the regional contests were invited to join the national competition.", translation: "地區比賽的獲勝者被邀請參加全國競賽。", collocations: [["regional", "contest", "地區比賽"], ["regional", "office", "地區辦事處"]], etymology: "region + -al (adjective suffix)." },
            { word: "forbid", targetWord: "forbidding", pos: "vt.", chinese: "禁止", english: "not to allow someone to do something", syllables: ["for", "bid"], ipa: "/fo'bid/", example: "By forbidding factories to dump their waste in the sea, the government cleaned up the coast.", translation: "透過禁止工廠將廢棄物傾倒在海中，政府得以清理海岸。", collocations: [["strictly", "forbidden", "嚴格禁止"], ["forbid", "entry", "禁止進入"], ["forbid", "doing", "禁止做某事"]], etymology: "for- (away) + bid (to offer)." },
            { word: "continue", targetWord: "continued", pos: "vt.", chinese: "繼續", english: "to carry on or not stop", syllables: ["con", "tin", "ue"], ipa: "/kən'tınjo/", example: "After a short break for lunch, Wally continued his work.", translation: "午餐休息一會兒後，華利繼續他的工作。", collocations: [["continue", "working", "繼續工作"], ["continue", "education", "繼續受教育"]], etymology: "From Latin 'con-' (together) + 'tenere' (to hold)." },
            { word: "continuous", targetWord: "continuous", pos: "adj.", chinese: "持續不斷的", english: "happening without stopping", syllables: ["con", "tin", "u", "ous"], ipa: "/kən'tınjuəs/", example: "The continuous rain has caused floods in many parts of the country.", translation: "持續不斷的雨水導致該國許多地區發生洪水。", collocations: [["continuous", "rain", "持續降雨"], ["continuous", "improvement", "持續進步"]], etymology: "continue + -ous (adjective suffix)." },
            { word: "education", targetWord: "education", pos: "n.", chinese: "教育", english: "process of teaching or training in a school", syllables: ["ed", "u", "ca", "tion"], ipa: "/,edzu'kesǝn/", example: "Two new schools were built to improve the quality of education in this remote area.", translation: "為了提高這個偏遠地區的教育品質，興建了兩所新學校。", collocations: [["higher", "education", "高等教育"], ["receive", "education", "接受教育"]], etymology: "e- (out) + ducere (to lead)." },
            { word: "educational", targetWord: "educational", pos: "adj.", chinese: "教育的", english: "relating to providing information or teaching", syllables: ["ed", "u", "ca", "tion", "al"], ipa: "/,edzu'kefǝn!/", example: "Language learning textbooks and other educational materials can be ordered online.", translation: "語言學習教科書和其他教育教材可以網上訂購。", collocations: [["educational", "materials", "教育教材"], ["educational", "system", "教育制度"]], etymology: "education + -al." },
            { word: "principal", targetWord: "principal", pos: "n./adj.", chinese: "校長；主要的", english: "head of a school; most important", syllables: ["prin", "ci", "pal"], ipa: "/'prinsəp!/", example: "Mrs. Lee has been the school's principal for ten years.", translation: "李太太擔任這所學校的校長已經十年了。", collocations: [["school", "principal", "學校校長"], ["principal", "reason", "主要原因"]], etymology: "From Latin 'primus' (first) + 'capere' (to take)." },

            { word: "recover", targetWord: "recovered", pos: "vi.", chinese: "康復", syllables: ["re", "cov", "er"], ipa: "/ri'kavǝ-/", english: "to heal or get better after sickness", example: "Stacy recovered from the flu last week.", translation: "史黛西上週感冒康復了。", collocations: [["recover", "from", "從...康復"]], etymology: "re- (again) + capere (to get)." },

            { word: "persuade", targetWord: "persuade", pos: "vt.", chinese: "說服", syllables: ["per", "suade"], ipa: "/po'swed/", english: "use arguments to make someone do something", example: "He tried to persuade her to do more exercise.", translation: "他試圖說服她多做運動。", collocations: [["persuade", "someone to", "說服某人做..."], ["try to", "persuade", "試圖說服"]], etymology: "per- (thoroughly) + suadere (to urge)." },
            { word: "persuasion", targetWord: "persuasion", pos: "n.", chinese: "說服", syllables: ["per", "sua", "sion"], ipa: "/pə-swezǝn/", english: "the act of persuading someone", example: "Using his powers of persuasion, Richie convinced her.", translation: "利用他的說服力，里奇說服了她。", collocations: [["powers of", "persuasion", "說服力"]], etymology: "persuade + -ion." },
            { word: "persuasive", targetWord: "persuasive", pos: "adj.", chinese: "有說服力的", syllables: ["per", "sua", "sive"], ipa: "/pa'swesiv/", english: "able to make someone believe something", example: "Alice came up with several persuasive arguments.", translation: "艾莉絲提出了幾個非常有說服力的論點。", collocations: [["persuasive", "argument", "有說服力的論點"]], etymology: "persuade + -ive." },
            { word: "adopt", targetWord: "adopted", pos: "vt.", chinese: "採納/領養", syllables: ["a", "dopt"], ipa: "/ə'dapt/", english: "approve a method or take a child as one's own", example: "Oliver was adopted by his aunt.", translation: "奧利佛被他的姑姑領養了。", collocations: [["adopt", "a policy", "採納政策"], ["adopt", "a child", "領養小孩"]], etymology: "ad- (to) + optare (to choose)." },
            { word: "policy", targetWord: "policies", pos: "n.", chinese: "政策", syllables: ["pol", "i", "cy"], ipa: "/'paləsı/", english: "a plan adopted by an organization", example: "The government adopted stricter policies on recycling.", translation: "政府採納了更嚴格的回收政策。", collocations: [["government", "policy", "政府政策"], ["strict", "policy", "嚴格政策"]], etymology: "From Greek 'polis' (city)." },
            { word: "ensure", targetWord: "ensure", pos: "vt.", chinese: "確保", syllables: ["en", "sure"], ipa: "/in'for/", english: "to make certain that something happens", example: "A new law will ensure that every child gets care.", translation: "將制定一項新法律以確保每個孩子都能得到適當的照料。", collocations: [["ensure", "safety", "確保安全"], ["ensure", "success", "確保成功"]], etymology: "en- (make) + sure (certain)." },
            { word: "establish", targetWord: "established", pos: "vt.", chinese: "建立", syllables: ["es", "tab", "lish"], ipa: "/ə'stæblı/", english: "to start or found an organization", example: "Harvard University was established in 1636.", translation: "哈佛大學成立於 1636 年。", collocations: [["establish", "a business", "創立事業"], ["established", "in", "成立於..."]], etymology: "Latin 'stare' (to stand)." },
            { word: "honor", targetWord: "honors", pos: "n./vt.", chinese: "榮譽；致敬", syllables: ["hon", "or"], ipa: "/'ano/", english: "special award or great respect", example: "Ang Lee has received many honors and awards.", translation: "李安獲得了許多榮譽和獎項。", collocations: [["great", "honor", "莫大榮幸"], ["in honor of", "向...致敬"]], etymology: "Latin 'honos' (honor)." },
            { word: "honorable", targetWord: "honorable", pos: "adj.", chinese: "值得敬佩的", syllables: ["hon", "or", "a", "ble"], ipa: "/'anərəbl/", english: "deserving respect and admiration", example: "Everyone stood as the honorable judge entered.", translation: "法庭上的每個人在受人尊敬的法官進入時都起立。", collocations: [["honorable", "judge", "尊敬的法官"]], etymology: "honor + -able." },
            { word: "weapon", targetWord: "weapon", pos: "n.", chinese: "手段；武器", syllables: ["weap", "on"], ipa: "/'wepən/", english: "an effective tool for success or fighting", example: "Exercising is an effective weapon against stress.", translation: "運動被認為是對抗壓力的有效手段。", collocations: [["effective", "weapon", "有效手段"], ["deadly", "weapon", "致命武器"]], etymology: "Old English 'waepen'." }
        ];

        let currentUser = { class: "", no: "", name: "", xp: 0 };
        let learnStats = { startTime: null, totalSeconds: 0, viewedIndices: new Set() };
        let currentLearnIdx = 0;
        let activeActivity = { type: "", questions: [], currentIdx: 0, score: 0, lastSpeechResult: "", isChecked: false };

        function handleLogin() {
            const clz = document.getElementById('login-class').value;
            const no = document.getElementById('login-no').value;
            const name = document.getElementById('login-name').value;
            if(!clz || !no || !name) return;
            currentUser = { class: clz, no: no, name: name, xp: 0 };
            document.getElementById('user-info').textContent = `${clz}班 ${no}號 ${name}`;
            document.getElementById('screen-login').classList.add('hidden-screen');
            document.getElementById('screen-dashboard').classList.remove('hidden-screen');
            switchMode('learn');
        }

        function switchMode(mode) {
            if(mode === 'learn') {
                learnStats.startTime = Date.now();
            } else {
                if(learnStats.startTime) {
                    learnStats.totalSeconds += Math.floor((Date.now() - learnStats.startTime) / 1000);
                    learnStats.startTime = null;
                    submitResult("LEARN TRACKING");
                }
            }
            const tabs = { learn: document.getElementById('tab-learn'), coach: document.getElementById('tab-coach') };
            const contents = { learn: document.getElementById('content-learn'), coach: document.getElementById('content-coach') };
            const learnFooter = document.getElementById('learn-footer');
            Object.keys(tabs).forEach(k => {
                tabs[k].classList.remove('bg-white'); tabs[k].classList.add('bg-gray-100');
                contents[k].classList.add('hidden-screen');
            });
            tabs[mode].classList.add('bg-white');
            contents[mode].classList.remove('hidden-screen');
            if(mode === 'learn') { learnFooter.classList.remove('hidden-screen'); renderLearnCard(); } 
            else { learnFooter.classList.add('hidden-screen'); }
        }

        function renderLearnCard() {
            const item = VOCAB_DATA[currentLearnIdx];
            learnStats.viewedIndices.add(currentLearnIdx);
            const container = document.getElementById('learn-card-container');
            
            container.innerHTML = `
                <div class="card-main">
                    <div class="learn-header">
                        <span class="pos-badge">${item.pos}</span>
                        <h2 class="text-white text-5xl font-black italic tracking-tighter">${item.word}</h2>
                    </div>
                    
                    <div class="flex items-center gap-3 mb-6">
                        <div class="flex">${item.syllables.map(s => `<span class="syllable-pill">${s}</span>`).join('')}</div>
                        <span class="ipa-pill">${item.ipa}</span>
                        <button onclick="speak('${item.word}')" class="w-12 h-12 neo-brutal rounded-full flex items-center justify-center bg-white ml-auto" style="box-shadow: 3px 3px 0px black;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>

                    <div class="mb-6">
                        <p class="section-label">Meaning</p>
                        <p class="meaning-text">${item.english} <span class="text-purple-600">(${item.chinese})</span></p>
                    </div>

                    <div class="mb-6">
                        <p class="section-label">Example</p>
                        <p class="example-text">"${item.example}"</p>
                        <p class="text-xs text-gray-400 mt-2 font-black">${item.translation}</p>
                    </div>

                    <div class="mb-6 bg-blue-50 p-4 rounded-3xl border-2 border-blue-100">
                        <p class="text-blue-500 font-black text-[10px] uppercase mb-1 tracking-widest">Etymology / Word Root</p>
                        <p class="text-sm font-bold text-blue-900 leading-relaxed">${item.etymology}</p>
                    </div>

                    <div class="mini-match-box">
                         <p class="text-pink-500 font-black text-xs mb-3 uppercase tracking-widest flex items-center gap-2">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            Mini Match (Oxford)
                         </p>
                         <div class="grid grid-cols-2 gap-3">
                            ${item.collocations.map((c, i) => `<div class="mini-match-btn cursor-pointer" onclick="handleMatch(this, '${item.word}', ${i}, 'en')">${c[0]} ${c[1]}</div><div class="mini-match-btn cursor-pointer" onclick="handleMatch(this, '${item.word}', ${i}, 'cn')">${c[2]}</div>`).join('')}
                         </div>
                    </div>
                </div>
            `;
        }

        function nextLearnWord() { currentLearnIdx = (currentLearnIdx + 1) % VOCAB_DATA.length; renderLearnCard(); }

        let matchState = { el: null, idx: null, side: null };
        function handleMatch(el, word, idx, side) {
            if(el.classList.contains('correct')) return;
            el.classList.add('selected');
            if(!matchState.side) { matchState = { el, idx, side }; }
            else {
                if(matchState.side !== side && matchState.idx === idx) {
                    el.classList.add('correct'); matchState.el.classList.add('correct');
                    currentUser.xp += 5; updateXP();
                }
                el.classList.remove('selected'); matchState.el.classList.remove('selected');
                matchState = { el: null, idx: null, side: null };
            }
        }

        function updateXP() { document.getElementById('user-xp').textContent = `${currentUser.xp} XP`; }

        function startCoach(type) {
            activeActivity = { type, questions: [...VOCAB_DATA].sort(()=>Math.random()-0.5).slice(0, 15), currentIdx: 0, score: 0, lastSpeechResult: "", isChecked: false };
            document.getElementById('screen-dashboard').classList.add('hidden-screen');
            document.getElementById('overlay-activity').classList.remove('hidden-screen');
            renderCoachQuestion();
        }

        function renderCoachQuestion() {
            const q = activeActivity.questions[activeActivity.currentIdx];
            const body = document.getElementById('activity-body');
            const actionBtn = document.getElementById('btn-action');
            activeActivity.isChecked = false; activeActivity.lastSpeechResult = "";
            document.getElementById('activity-progress').textContent = `${activeActivity.currentIdx + 1} / 15`;
            body.innerHTML = "";
            actionBtn.textContent = "Check Answer"; actionBtn.className = "bottom-action-btn"; 
            actionBtn.onclick = () => performCheck(); 

            if(activeActivity.type === 'PRO SPEAK') {
                body.innerHTML = `<h2 class="text-5xl font-black mb-8">${q.word}</h2><div id="mic-btn" class="w-32 h-32 rounded-full bg-yellow-400 neo-brutal flex items-center justify-center cursor-pointer" onclick="startMic()"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></div><p id="speech-text" class="mt-4 text-xl font-bold italic"></p>`;
            } else if(activeActivity.type === 'SPELL IT') {
                body.innerHTML = `<button onclick="speak('${q.word}')" class="w-24 h-24 rounded-full bg-blue-100 border-4 border-black mb-8 flex items-center justify-center"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button><p class="text-center font-bold text-gray-500 mb-6 text-sm px-4">Definition: ${q.english}</p><div class="w-full max-w-xs text-center border-b-8 border-black"><input id="coach-input" type="text" class="w-full text-3xl font-black bg-transparent text-center focus:outline-none py-4" placeholder="Type word..." autocomplete="off"></div>`;
                setTimeout(()=>speak(q.word), 300);
            } else {
                const target = q.targetWord || q.word;
                const displayHint = `<span class="cloze-blank">${target[0]}${"_".repeat(target.length-2)}${target[target.length-1]}</span>`;
                body.innerHTML = `<div class="bg-white neo-brutal p-6 w-full max-w-sm" style="border-radius:25px;"><span class="bg-purple-100 text-purple-600 text-[10px] font-black px-2 py-1 rounded mb-4 inline-block uppercase">Cloze Test</span><div class="text-lg font-bold leading-relaxed mb-6">${q.example.replace(new RegExp(target, 'gi'), displayHint)}</div><p id="coach-hint" class="hidden text-gray-400 italic text-sm mb-4 bg-gray-50 p-2 rounded">${q.translation}</p><button onclick="document.getElementById('coach-hint').classList.toggle('hidden')" class="text-blue-500 text-xs font-bold mb-6">Show Translation</button><input id="coach-input" type="text" class="w-full neo-brutal p-4 font-bold text-center text-xl" placeholder="Type word..." autocomplete="off" style="border-radius:15px; border-color: #E2E8F0;"></div>`;
            }
            const input = document.getElementById('coach-input');
            if(input) { input.focus(); input.onkeyup = (e) => { if(e.key === "Enter") performCheck(); }; }
        }

        function superNormalize(str) { return (str || "").toString().toLowerCase().replace(/[^a-z0-9]/gi, '').trim(); }

        function performCheck() {
            if (activeActivity.isChecked) {
                activeActivity.currentIdx++;
                if (activeActivity.currentIdx < 15) renderCoachQuestion();
                else { submitResult(); alert(`挑戰完成！您的得分是：${activeActivity.score}`); exitActivity(); }
                return;
            }
            const q = activeActivity.questions[activeActivity.currentIdx];
            const actionBtn = document.getElementById('btn-action');
            const targetStr = (activeActivity.type === 'FILL IN') ? superNormalize(q.targetWord || q.word) : superNormalize(q.word);
            const displayAns = (activeActivity.type === 'FILL IN') ? (q.targetWord || q.word) : q.word;

            let userInput = "";
            const inputEl = document.getElementById('coach-input');
            if (activeActivity.type === 'PRO SPEAK' && activeActivity.lastSpeechResult !== "") { userInput = superNormalize(activeActivity.lastSpeechResult); } 
            else if (inputEl) { userInput = superNormalize(inputEl.value); }

            if(userInput === targetStr && userInput !== "") { 
                actionBtn.classList.add('bg-green-500'); actionBtn.textContent = "CORRECT!"; currentUser.xp += 10; activeActivity.score += 10; updateXP(); 
            } else { 
                actionBtn.classList.add('bg-red-500'); actionBtn.textContent = "WRONG! Answer: " + displayAns; 
            }
            activeActivity.isChecked = true;
        }

        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("不支援語音辨識");
            const rec = new SpeechRecognition(); rec.lang = 'en-US';
            const micBtn = document.getElementById('mic-btn');
            rec.start(); micBtn.classList.add('pulse-mic', 'bg-red-400');
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript;
                document.getElementById('speech-text').innerText = `You said: "${res}"`;
                activeActivity.lastSpeechResult = res; performCheck(); 
            };
            rec.onspeechend = () => { rec.stop(); micBtn.classList.remove('pulse-mic', 'bg-red-400'); };
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; window.speechSynthesis.speak(utterance);
        }

        function submitResult(overriddenType) {
            if(!SCRIPT_URL) return;
            const isLearnComplete = learnStats.viewedIndices.size >= VOCAB_DATA.length ? "YES" : `${learnStats.viewedIndices.size}/${VOCAB_DATA.length}`;
            fetch(SCRIPT_URL, { 
                method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ class: currentUser.class, no: currentUser.no, name: currentUser.name, type: overriddenType || activeActivity.type, score: activeActivity.score || 0, learnDuration: learnStats.totalSeconds, isLearnComplete: isLearnComplete }) 
            });
        }

        function exitActivity() { document.getElementById('overlay-activity').classList.add('hidden-screen'); document.getElementById('screen-dashboard').classList.remove('hidden-screen'); }
    </script>
</body>
</html>
