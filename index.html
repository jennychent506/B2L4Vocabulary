<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabPop - L4 Malala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pop-pink: #E96D9E;
            --pop-purple: #706CF5;
            --pop-blue-btn: #6670ED;
            --pop-yellow: #FBE269;
            --pop-bg: #FFEBEB;
            --pop-black: #1A1A1A;
            --pop-blue-card: #3B66F5;
        }

        body {
            font-family: 'Lexend', 'Noto Sans TC', sans-serif;
            background-color: var(--pop-bg);
            color: var(--pop-black);
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .neo-brutal {
            border: 3px solid var(--pop-black);
            box-shadow: 6px 6px 0px var(--pop-black);
            border-radius: 35px;
        }

        .login-card { background: white; position: relative; overflow: hidden; }
        .login-top-bar { height: 18px; background-color: var(--pop-pink); width: 100%; border-bottom: 3px solid var(--pop-black); }

        .btn-start {
            background-color: var(--pop-blue-btn);
            color: white;
            border: 3px solid var(--pop-black);
            box-shadow: 4px 4px 0px var(--pop-black);
            border-radius: 20px;
            transition: all 0.1s;
        }

        .input-brutal {
            border: 3px solid var(--pop-black);
            border-radius: 18px;
            padding: 12px 16px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #1a1a1a;
        }

        .hidden-screen { display: none !important; }

        /* --- Learn Card Styles --- */
        .card-main { 
            background: white; padding: 24px; width: 100%; 
            border: 4px solid var(--pop-black); 
            box-shadow: 10px 10px 0px var(--pop-black); 
            border-radius: 40px; 
            overflow: hidden;
        }
        
        .learn-header {
            background-color: var(--pop-blue-card);
            height: 150px;
            margin: -24px -24px 20px -24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: radial-gradient(circle, rgba(255,255,255,0.4) 2px, transparent 2px);
            background-size: 18px 18px;
            border-bottom: 4px solid var(--pop-black);
        }

        .pos-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: black;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
        }

        .word-title {
            color: white;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-align: center;
        }

        .pill-container { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 20px; }

        .syllable-pill {
            background: var(--pop-yellow);
            padding: 5px 15px;
            border-radius: 50px;
            border: 2px solid var(--pop-black);
            font-weight: 900;
            font-size: 0.9rem;
            color: var(--pop-black);
        }

        .ipa-pill {
            background: white;
            padding: 5px 15px;
            border-radius: 50px;
            border: 2px solid #E5E7EB;
            color: #9CA3AF;
            font-weight: 700;
            font-size: 0.9rem;
            font-style: italic;
        }

        .section-label { font-weight: 900; color: #D1D5DB; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 4px; }
        .meaning-text { font-weight: 800; font-size: 1.3rem; line-height: 1.3; margin-bottom: 15px; color: #111827; }
        .example-text { font-style: italic; color: #4B5563; line-height: 1.4; font-weight: 600; font-size: 1.05rem; }

        .mini-match-box {
            background-color: #FFF1F7;
            border-radius: 25px;
            padding: 20px;
            margin-top: 25px;
            border: 2px solid #FFE4F0;
        }

        .mini-match-btn {
            background: white;
            border: 2px solid #F3F4F6;
            padding: 12px 8px;
            border-radius: 15px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 800;
            box-shadow: 0px 3px 0px rgba(0,0,0,0.05);
        }
        .mini-match-btn.selected { border-color: var(--pop-purple); background: #F3F0FF; }
        .mini-match-btn.correct { border-color: #22C55E; background: #F0FDF4; opacity: 0.4; cursor: default; box-shadow: none; }

        .bottom-action-btn {
            background-color: var(--pop-black);
            color: white;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .cloze-blank {
            color: var(--pop-purple);
            text-decoration: underline;
            text-underline-offset: 8px;
            font-weight: 900;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="screen-login" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm neo-brutal login-card">
            <div class="login-top-bar"></div>
            <div class="p-8 pt-10">
                <div class="mx-auto w-24 h-24 bg-[#FBE269] border-[3px] border-black rounded-full flex items-center justify-center relative mb-4" style="box-shadow: 4px 4px 0px rgba(0,0,0,1);">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2-2 10h8L7 22l2-10H1L13 2Z" fill="white"/></svg>
                </div>
                <div class="text-center mb-8">
                    <h1 class="text-[2.6rem] font-[900] italic tracking-tight leading-none">
                        <span style="color: #645EEB;">VOCAB</span><span style="color: #E96D9E;">POP</span>
                    </h1>
                    <p class="text-[#8492A6] font-[800] text-sm mt-2 tracking-widest uppercase">Student Login</p>
                </div>
                <div class="space-y-5">
                    <div class="flex gap-4">
                        <div class="w-1/2">
                            <label class="block text-[#3C4858] font-black text-xs mb-1 uppercase tracking-wider">Class</label>
                            <input id="login-class" type="text" class="w-full input-brutal" placeholder="101">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-[#3C4858] font-black text-xs mb-1 uppercase tracking-wider">No.</label>
                            <input id="login-no" type="text" class="w-full input-brutal" placeholder="15">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[#3C4858] font-black text-xs mb-1 uppercase tracking-wider">Name</label>
                        <input id="login-name" type="text" class="w-full input-brutal" placeholder="姓名">
                    </div>
                    <button onclick="handleLogin()" class="w-full btn-start py-5 text-xl font-black mt-4 flex items-center justify-center gap-3 uppercase">
                        Start Journey <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="screen-dashboard" class="hidden-screen min-h-screen flex flex-col">
        <header class="p-4 bg-white border-b-4 border-black z-50">
            <div class="flex justify-between items-center max-w-lg mx-auto">
                <div class="flex flex-col">
                    <h2 class="text-xl font-black tracking-tight uppercase"><span style="color: var(--pop-purple);">VOCAB</span><span style="color: var(--pop-pink);">POP</span></h2>
                    <p id="user-info" class="text-xs text-gray-500 font-bold"></p>
                </div>
                <div class="bg-black text-white px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2">
                    <span class="text-pop-yellow">★ LV.1</span> | <span id="user-xp">0 XP</span>
                </div>
            </div>
            <div class="flex mt-4 gap-2 max-w-lg mx-auto">
                <button id="tab-learn" onclick="switchMode('learn')" class="flex-1 py-3 neo-brutal font-bold flex items-center justify-center gap-2 bg-white" style="border-radius:15px; box-shadow: 3px 3px 0px black;">LEARN</button>
                <button id="tab-coach" onclick="switchMode('coach')" class="flex-1 py-3 neo-brutal font-bold flex items-center justify-center gap-2 bg-gray-100" style="border-radius:15px; box-shadow: 3px 3px 0px black;">COACH</button>
            </div>
        </header>
        <main id="content-learn" class="flex-1 p-6 max-w-lg mx-auto w-full overflow-y-auto"><div id="learn-card-container"></div></main>
        <main id="content-coach" class="hidden-screen flex-1 p-4 max-w-lg mx-auto w-full space-y-4">
            <button onclick="startCoach('PRO SPEAK')" class="w-full neo-brutal bg-[#A0E9A8] p-6 flex items-center gap-6 text-left">
                <div class="bg-white p-4 rounded-2xl border-3 border-black"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></div>
                <div><h3 class="text-2xl font-black uppercase">Pro Speak</h3><p class="text-sm font-bold opacity-70">發音挑戰 (隨機 15 題)</p></div>
            </button>
            <button onclick="startCoach('SPELL IT')" class="w-full neo-brutal bg-[#B6C2FF] p-6 flex items-center gap-6 text-left">
                <div class="bg-white p-4 rounded-2xl border-3 border-black"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></svg></div>
                <div><h3 class="text-2xl font-black uppercase">Spell It</h3><p class="text-sm font-bold opacity-70">聽音拼寫 (隨機 15 題)</p></div>
            </button>
            <button onclick="startCoach('FILL IN')" class="w-full neo-brutal bg-[#FFD5A1] p-6 flex items-center gap-6 text-left">
                <div class="bg-white p-4 rounded-2xl border-3 border-black"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></div>
                <div><h3 class="text-2xl font-black uppercase">Fill In</h3><p class="text-sm font-bold opacity-70">搭配詞克漏字 (隨機 15 題)</p></div>
            </button>
        </main>
        <footer id="learn-footer" class="p-4 bg-white border-t-4 border-black"><button onclick="nextLearnWord()" class="bottom-action-btn uppercase">Next Word →</button></footer>
    </div>

    <!-- 3. OVERLAY -->
    <div id="overlay-activity" class="hidden-screen fixed inset-0 z-[100] bg-[#FFF5EB] flex flex-col">
        <header class="p-4 flex justify-between items-center border-b-4 border-black bg-white"><button onclick="exitActivity()" class="neo-brutal px-3 py-1 bg-white font-bold text-sm uppercase">Exit</button><div id="activity-progress" class="bg-gray-100 px-3 py-1 rounded-full font-bold text-sm border-2 border-black">1 / 15</div></header>
        <div id="activity-body" class="flex-1 p-6 flex flex-col items-center justify-center overflow-y-auto text-center"></div>
        <footer class="p-6 bg-white border-t-4 border-black"><button id="btn-action" class="bottom-action-btn uppercase">Check Answer</button></footer>
    </div>

            { word: "policy", targetWord: "policies", pos: "n.", chinese: "政策", syllables: ["pol", "i", "cy"], ipa: "/'paləsı/", english: "a plan by organization", learnEx: "Strict policy against harassment.", learnTrans: "嚴格的政策規定。", pdfEx: "The amount of waste has been greatly reduced since our government adopted stricter policies on recycling.", pdfTrans: "自從政府採取更嚴格的回收政策後...", collocations: [["government", "policy", "政府政策"]], etymology: "From Greek 'polis'." },
            { word: "ensure", targetWord: "ensure", pos: "vt.", chinese: "確保", syllables: ["en", "sure"], ipa: "/in'for/", english: "make certain something happens", learnEx: "Taken steps to ensure safety.", learnTrans: "確保安全。", pdfEx: "A new law will be made to ensure that every child will get proper care and education.", pdfTrans: "將制定一項新法律以確保每個孩子都能得到適當的照料。", collocations: [["ensure", "safety", "確保安全"]], etymology: "en- (make) + sure." },
            { word: "establish", targetWord: "established", pos: "vt.", chinese: "建立", syllables: ["es", "tab", "lish"], ipa: "/ə'stæblı/", english: "to start or found", learnEx: "Established in the 18th century.", learnTrans: "建立於 18 世紀。", pdfEx: "Harvard University was established in 1636 and is the oldest university in the US.", pdfTrans: "哈佛大學成立於 1636 年。", collocations: [["establish", "a business", "創立事業"]], etymology: "Latin 'stare' (stand)." },
            { word: "establishment", targetWord: "establishment", pos: "n.", chinese: "建立", syllables: ["es", "tab", "lish", "ment"], ipa: "/ə'stæblıʃmənt/", english: "the act of starting an organization", learnEx: "The establishment of the new clinic was welcomed.", learnTrans: "新診所的建立受到了歡迎。", pdfEx: "The establishment of the children's home has ensured that orphans are provided with food.", pdfTrans: "兒童之家的建立確保了孤兒獲得食物。", collocations: [["establishment", "of", "建立..."]], etymology: "establish + -ment." },
            { word: "honor", targetWord: "honors", pos: "n./vt.", chinese: "榮譽", syllables: ["hon", "or"], ipa: "/'ano/", english: "special award or respect", learnEx: "Great honor to be invited.", learnTrans: "受邀前往白宮是一份莫大的榮幸。", pdfEx: "Ang Lee has received many honors and awards for his inspiring movies.", pdfTrans: "李安獲得了許多榮譽和獎項。", collocations: [["great", "honor", "莫大榮幸"]], etymology: "Latin 'honos'." },
            { word: "honorable", targetWord: "honorable", pos: "adj.", chinese: "值得敬佩的", syllables: ["hon", "or", "a", "ble"], ipa: "/'anərəbl/", english: "deserving respect", learnEx: "An honorable goal to help others.", learnTrans: "高尚的目標。", pdfEx: "Everyone in the courtroom stood and remained silent as the honorable judge entered.", pdfTrans: "法庭上的每個人在受人尊敬的法官進入時都起立。", collocations: [["honorable", "judge", "尊敬的法官"]], etymology: "honor + -able." },
            { word: "weapon", targetWord: "weapon", pos: "n.", chinese: "手段；武器", syllables: ["weap", "on"], ipa: "/'wepən/", english: "tool for success or fighting", learnEx: "Nuclear weapons are a threat.", learnTrans: "核子武器構成威脅。", pdfEx: "Exercising is considered to be an effective weapon against stress.", pdfTrans: "運動被認為是對抗壓力的有效手段。", collocations: [["effective", "weapon", "有效手段"]], etymology: "Old English 'waepen'." },

            // Phrases
            { word: "out of control", targetWord: "out of control", pos: "phr.", chinese: "失去控制", english: "no longer manageable", syllables: ["out", "of", "con", "trol"], ipa: "/aʊt əv kən'trol/", learnEx: "The fire quickly got out of control.", learnTrans: "火勢迅速失去了控制。", pdfEx: "Everything in the area seemed to be out of control.", pdfTrans: "該地區的一切似乎都失去了控制。", collocations: [["completely", "out of control", "完全失控"]], etymology: "From 'control' (power to direct)." },
            { word: "take over", targetWord: "take over", pos: "phr.", chinese: "接管", english: "to take control of something", syllables: ["take", "ov", "er"], ipa: "/tek 'ovə/", learnEx: "The army tried to take over the government.", learnTrans: "軍隊試圖接管政府。", pdfEx: "The Taliban took over the area and made many new laws.", pdfTrans: "塔利班接管了該地區並制定了許多新法律。", collocations: [["take over", "the company", "接管公司"]], etymology: "take (grab) + over (above)." },
            { word: "at the age of", targetWord: "at the age of", pos: "phr.", chinese: "在...歲時", english: "when someone was a certain age", syllables: ["at", "the", "age", "of"], ipa: "/æt ðə edʒ əv/", learnEx: "He started playing piano at the age of five.", learnTrans: "他五歲時開始學鋼琴。", pdfEx: "At the age of 17, Malala became the youngest person to win the Nobel Peace Prize.", pdfTrans: "在17歲時，馬拉拉成為最年輕的諾貝爾和平獎得主。", collocations: [], etymology: "Age (period of life)." },
            { word: "condemn to", targetWord: "condemned to", pos: "phr.", chinese: "處以...刑罰", english: "to give someone a severe punishment", syllables: ["con", "demn", "to"], ipa: "/kən'dɛm tu/", learnEx: "He was condemned to death for his crimes.", learnTrans: "他因罪被處以死刑。", pdfEx: "Malala was condemned to death by the Taliban for her beliefs.", pdfTrans: "馬拉拉因其信念被塔利班處以死刑。", collocations: [["condemn", "to death", "判處死刑"]], etymology: "From Latin 'condemnare'." },
            { word: "make a difference", targetWord: "make a difference", pos: "phr.", chinese: "有影響/起作用", english: "to have an effect on a situation", syllables: ["make", "a", "dif", "fer", "ence"], ipa: "/mek ə 'difrəns/", learnEx: "Giving even a small amount of money can make a difference.", learnTrans: "即使捐一點錢也能起作用。", pdfEx: "She believed that one person could really make a difference.", pdfTrans: "她相信一個人真的可以改變世界。", collocations: [["make a", "huge difference", "產生巨大影響"]], etymology: "Difference (distinction/change)." }
        ];

        let currentUser = { class: "", no: "", name: "", xp: 0 };
        let learnStats = { startTime: null, totalSeconds: 0, viewedIndices: new Set() };
        let currentLearnIdx = 0;
        let activeActivity = { type: "", questions: [], currentIdx: 0, score: 0, lastSpeechResult: "", isChecked: false };

        function handleLogin() {
            const clz = document.getElementById('login-class').value.trim();
            const no = document.getElementById('login-no').value.trim();
            const name = document.getElementById('login-name').value.trim();
            if(!clz || !no || !name) return;
            currentUser = { class: clz, no: no, name: name, xp: 0 };
            document.getElementById('user-info').textContent = `${clz}班 ${no}號 ${name}`;
            document.getElementById('screen-login').classList.add('hidden-screen');
            document.getElementById('screen-dashboard').classList.remove('hidden-screen');
            switchMode('learn');
        }

        function switchMode(mode) {
            if(mode === 'learn') { learnStats.startTime = Date.now(); } 
            else {
                if(learnStats.startTime) {
                    learnStats.totalSeconds += Math.floor((Date.now() - learnStats.startTime) / 1000);
                    learnStats.startTime = null;
                    submitResult("LEARN TRACKING");
                }
            }
            const tabs = { learn: document.getElementById('tab-learn'), coach: document.getElementById('tab-coach') };
            const contents = { learn: document.getElementById('content-learn'), coach: document.getElementById('content-coach') };
            const learnFooter = document.getElementById('learn-footer');
            Object.keys(tabs).forEach(k => {
                tabs[k].classList.remove('bg-white'); tabs[k].classList.add('bg-gray-100');
                contents[k].classList.add('hidden-screen');
            });
            tabs[mode].classList.add('bg-white');
            contents[mode].classList.remove('hidden-screen');
            if(mode === 'learn') { learnFooter.classList.remove('hidden-screen'); renderLearnCard(); } 
            else { learnFooter.classList.add('hidden-screen'); }
        }

        function renderLearnCard() {
            const item = VOCAB_DATA[currentLearnIdx];
            learnStats.viewedIndices.add(currentLearnIdx);
            const container = document.getElementById('learn-card-container');
            container.innerHTML = `
                <div class="card-main">
                    <div class="learn-header">
                        <span class="pos-badge">${item.pos}</span>
                        <h2 class="word-title uppercase">${item.word}</h2>
                    </div>
                    <div class="pill-container">
                        ${item.syllables.map(s => `<span class="syllable-pill">${s}</span>`).join('')}
                        <span class="ipa-pill">${item.ipa}</span>
                        <button onclick="speak('${item.word}')" class="w-12 h-12 neo-brutal rounded-full flex items-center justify-center bg-white ml-auto" style="box-shadow: 3px 3px 0px black;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        </button>
                    </div>
                    <div class="mb-5"><p class="section-label">Meaning</p><p class="meaning-text">${item.english} <span class="text-purple-600">(${item.chinese})</span></p></div>
                    <div class="mb-5"><p class="section-label">Example (Cambridge/Longman)</p><p class="example-text">"${item.learnEx}"</p><p class="text-xs text-gray-400 mt-2 font-black">${item.learnTrans}</p></div>
                    <div class="mb-5 bg-blue-50 p-4 rounded-3xl border-2 border-blue-100"><p class="text-blue-500 font-black text-[10px] uppercase mb-1 tracking-widest">Etymology / Word Root</p><p class="text-sm font-bold text-blue-900 leading-relaxed">${item.etymology || "Phrase Usage"}</p></div>
                    <div class="mini-match-box"><p class="text-pink-500 font-black text-xs mb-3 uppercase tracking-widest">Mini Match (Oxford)</p>
                         <div class="grid grid-cols-2 gap-3">
                            ${item.collocations.map((c, i) => `<div class="mini-match-btn cursor-pointer" onclick="handleMatch(this, '${item.word}', ${i}, 'en')">${c[0]} ${c[1]}</div><div class="mini-match-btn cursor-pointer" onclick="handleMatch(this, '${item.word}', ${i}, 'cn')">${c[2]}</div>`).join('')}
                         </div>
                    </div>
                </div>`;
        }

        function nextLearnWord() { currentLearnIdx = (currentLearnIdx + 1) % VOCAB_DATA.length; renderLearnCard(); }

        let matchState = { el: null, idx: null, side: null };
        function handleMatch(el, word, idx, side) {
            if(el.classList.contains('correct')) return;
            el.classList.add('selected');
            if(!matchState.side) { matchState = { el, idx, side }; }
            else {
                if(matchState.side !== side && matchState.idx === idx) {
                    el.classList.add('correct'); matchState.el.classList.add('correct');
                    currentUser.xp += 5; updateXP();
                }
                el.classList.remove('selected'); matchState.el.classList.remove('selected');
                matchState = { el: null, idx: null, side: null };
            }
        }

        function updateXP() { document.getElementById('user-xp').textContent = `${currentUser.xp} XP`; }

        function startCoach(type) {
            activeActivity = { type, questions: [...VOCAB_DATA].sort(()=>Math.random()-0.5).slice(0, 15), currentIdx: 0, score: 0, lastSpeechResult: "", isChecked: false };
            document.getElementById('screen-dashboard').classList.add('hidden-screen');
            document.getElementById('overlay-activity').classList.remove('hidden-screen');
            renderCoachQuestion();
        }

        function renderCoachQuestion() {
            const q = activeActivity.questions[activeActivity.currentIdx];
            const body = document.getElementById('activity-body');
            const actionBtn = document.getElementById('btn-action');
            activeActivity.isChecked = false; activeActivity.lastSpeechResult = "";
            document.getElementById('activity-progress').textContent = `${activeActivity.currentIdx + 1} / 15`;
            body.innerHTML = "";
            actionBtn.textContent = "Check Answer"; actionBtn.className = "bottom-action-btn uppercase"; 
            actionBtn.onclick = () => performCheck(); 

            if(activeActivity.type === 'PRO SPEAK') {
                body.innerHTML = `<h2 class="text-5xl font-black mb-8 text-center uppercase">${q.word}</h2><div id="mic-btn" class="w-32 h-32 rounded-full bg-yellow-400 neo-brutal flex items-center justify-center cursor-pointer mx-auto" onclick="startMic()"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></div><p id="speech-text" class="mt-4 text-xl font-bold italic text-blue-600"></p>`;
            } else if(activeActivity.type === 'SPELL IT') {
                body.innerHTML = `<button onclick="speak('${q.word}')" class="w-24 h-24 rounded-full bg-blue-100 border-4 border-black mb-8 flex items-center justify-center mx-auto"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button><p class="text-center font-bold text-gray-500 mb-6 text-sm px-4">Definition: ${q.english}</p><div class="w-full max-w-xs mx-auto border-b-8 border-black"><input id="coach-input" type="text" class="w-full text-3xl font-black bg-transparent text-center focus:outline-none py-4" placeholder="???" autocomplete="off"></div>`;
                setTimeout(()=>speak(q.word), 300);
            } else {
                // --- FILL IN 核心挖空演算法修正 ---
                const target = q.targetWord; 
                const displayHint = `<span class="cloze-blank">${target[0]}${"_".repeat(target.length-2)}${target[target.length-1]}</span>`;
                
                // 採用最穩定的全字匹配替換，避免大小寫與標點符號干擾
                const originalSentence = q.pdfEx;
                // 轉義正則特殊字符
                const escapedTarget = target.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`\\b${escapedTarget}\\b`, 'gi');
                
                // 如果 regex 匹配不到（通常是片語或特殊標點），則改用簡單替換
                let processedEx = originalSentence.replace(regex, displayHint);
                if (processedEx === originalSentence) {
                    processedEx = originalSentence.replace(new RegExp(escapedTarget, 'gi'), displayHint);
                }

                body.innerHTML = `<div class="bg-white neo-brutal p-6 w-full max-w-sm mx-auto" style="border-radius:25px;"><span class="bg-purple-100 text-purple-600 text-[10px] font-black px-2 py-1 rounded mb-4 inline-block uppercase tracking-wider">Cloze Test (PDF Example)</span><div class="text-xl font-bold leading-relaxed mb-6 text-left">${processedEx}</div><p id="coach-hint" class="hidden text-gray-400 italic text-sm mb-4 bg-gray-50 p-2 rounded text-left">${q.pdfTrans}</p><button onclick="document.getElementById('coach-hint').classList.toggle('hidden')" class="text-blue-500 text-xs font-bold mb-6 block">Show Translation</button><input id="coach-input" type="text" class="w-full neo-brutal p-4 font-bold text-center text-xl" placeholder="Type word..." autocomplete="off" style="border-radius:15px; border-color: #E2E8F0;" autofocus></div>`;
            }
            const input = document.getElementById('coach-input');
            if(input) { input.focus(); input.onkeyup = (e) => { if(e.key === "Enter") performCheck(); }; }
        }

        function superNormalize(str) { return (str || "").toString().toLowerCase().trim().replace(/[^a-z0-9]/gi, ''); }

        function performCheck() {
            if (activeActivity.isChecked) {
                activeActivity.currentIdx++;
                if (activeActivity.currentIdx < 15) renderCoachQuestion();
                else { submitResult(); exitActivity(); alert(`挑戰完成！您的得分是：${activeActivity.score}`); }
                return;
            }
            const q = activeActivity.questions[activeActivity.currentIdx];
            const actionBtn = document.getElementById('btn-action');
            const targetStr = (activeActivity.type === 'FILL IN') ? superNormalize(q.targetWord) : superNormalize(q.word);
            const displayAns = (activeActivity.type === 'FILL IN') ? q.targetWord : q.word;
            let userInput = (activeActivity.type === 'PRO SPEAK') ? superNormalize(activeActivity.lastSpeechResult) : superNormalize(document.getElementById('coach-input')?.value);

            if(userInput === targetStr && userInput !== "") { 
                actionBtn.classList.add('bg-green-500'); actionBtn.textContent = "CORRECT!"; currentUser.xp += 10; activeActivity.score += 10; updateXP(); 
            } else { 
                actionBtn.classList.add('bg-red-500'); actionBtn.textContent = "WRONG! Ans: " + displayAns; 
            }
            activeActivity.isChecked = true;
        }

        function startMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("您的瀏覽器不支援語音辨識。");
            const rec = new SpeechRecognition(); rec.lang = 'en-US';
            rec.onresult = (e) => {
                activeActivity.lastSpeechResult = e.results[0][0].transcript;
                document.getElementById('speech-text').innerText = `You said: "${activeActivity.lastSpeechResult}"`;
                performCheck(); 
            };
            rec.start();
        }

        function speak(text) { const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; window.speechSynthesis.speak(utterance); }

        function submitResult(overriddenType) {
            if(!SCRIPT_URL) return;
            const isLearnComplete = learnStats.viewedIndices.size >= VOCAB_DATA.length ? "YES" : `${learnStats.viewedIndices.size}/${VOCAB_DATA.length}`;
            let currentDuration = learnStats.totalSeconds;
            if(learnStats.startTime) { currentDuration += Math.floor((Date.now() - learnStats.startTime) / 1000); }
            fetch(SCRIPT_URL, { 
                method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ 
                    class: currentUser.class, no: currentUser.no, name: currentUser.name, 
                    type: overriddenType || activeActivity.type, score: activeActivity.score || 0, 
                    learnDuration: currentDuration, isLearnComplete: isLearnComplete 
                }) 
            });
        }

        function exitActivity() { document.getElementById('overlay-activity').classList.add('hidden-screen'); document.getElementById('screen-dashboard').classList.remove('hidden-screen'); }
    </script>
</body>
